<!DOCTYPE html>
<html>
<head>
<title>Our Story ❤️</title>

<style>

body{
    margin:0;
    background:linear-gradient(to bottom,#0b1026,#1d0f2e);
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    overflow:hidden;
}

.container{
    padding-top:30px;
}
.container{
    position:relative;
    z-index:10;
    padding-top:30px;
}
.memory-image{
    width:90%;
    max-width:800px;
    border-radius:20px;
    box-shadow:0 0 25px pink;
}

h1{
    color:#ff9ccf;
}

.quote{
    font-size:22px;
    padding:20px;
    max-width:700px;
    margin:auto;
}

.btn{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.heart{
    position:absolute;
    z-index:1;
    pointer-events:none;
    animation:float 8s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:0;
    }
    to{
        transform:translateY(-100vh);
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="container">

<img src="images/Scene9.png" class="memory-image">

<h1>The Confession</h1>

<p class="quote">
    DEC 4 (9:04)
    asalaa aroju yentha tension vachindoo telusa 
    aa roju nenu chepali anukole mere full rechakotesaruu nanu anduke tension lo chepesa 
    asala cheppanu ee life ki anukunna but chepincharu 
    tharavatha anduke nenu answer odhu anna,msg inka cheyadhu anna ,
</p>

<br>

<button class="btn" onclick="location.href='scene10.html'">
Next Memory ❤️
</button>

</div>

<script>

for(let i=0;i<100;i++){

let heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";

heart.style.top=Math.random()*100+"vh";

heart.style.fontSize=(10+Math.random()*30)+"px";

heart.style.opacity=Math.random();

heart.style.animationDuration=
(4+Math.random()*8)+"s";

document.body.appendChild(heart);

}

</script>

</body>
</html>
