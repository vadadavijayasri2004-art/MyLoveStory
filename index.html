<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Surprise ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to bottom,#050510,#101020);
    font-family:Arial, sans-serif;
}

/* Stars */
.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:0.2;}
    50%{opacity:1;}
}

/* Center Content */
.container{
    text-align:center;
    color:white;
    z-index:10;
}

/* Heart */
.heart{
    font-size:90px;
    animation:beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

/* Typing Text */
#text{
    font-size:24px;
    margin-top:20px;
    min-height:100px;
    line-height:1.6;
}

/* Button */
button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff4d6d;
    color:white;
    font-size:18px;
    cursor:pointer;
    opacity:0;
    transition:0.5s;
}

button:hover{
    transform:scale(1.1);
}
</style>
</head>
<body>

<div class="container">

    <div class="heart">❤️</div>

    <div id="text"></div>

    <br>

    <button id="continueBtn">
        Continue
    </button>

</div>

<script>

// Create Stars
for(let i=0;i<100;i++){
    let star=document.createElement("div");
    star.classList.add("star");

    star.style.left=Math.random()*100+"vw";
    star.style.top=Math.random()*100+"vh";

    star.style.animationDelay=Math.random()*2+"s";

    document.body.appendChild(star);
}

// Typing Animation
const message =
`Hi ❤️

I want to show you something special...

Click continue when you're ready.`;

let index = 0;

function typeWriter(){
    if(index < message.length){
        document.getElementById("text").innerHTML += message.charAt(index);
        index++;
        setTimeout(typeWriter,70);
    }else{
        document.getElementById("continueBtn").style.opacity="1";
    }
}

typeWriter();

// Continue Button
document.getElementById("continueBtn").addEventListener("click",()=>{
    window.location.href="scene2.html";
});

</script>

</body>
</html>
